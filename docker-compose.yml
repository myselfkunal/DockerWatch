services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: dockerwatch-timescaledb

    environment:
      POSTGRES_DB: dockerwatch
      POSTGRES_USER: dockerwatch
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - timescaledb_data:/var/lib/postgresql/data

volumes:
  timescaledb_data: