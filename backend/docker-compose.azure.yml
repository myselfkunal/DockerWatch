services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: dockerwatch
      POSTGRES_USER: dockerwatch
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockerwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://dockerwatch:${DB_PASSWORD}@db:5432/dockerwatch
    ports:
      - "80:8000"

volumes:
  pgdata: